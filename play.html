<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Arcade Mystery Cache</title>

<link rel="stylesheet" href="styles.css">

<style>

.instructions{
    margin-bottom:20px;
}

#gameInfo{
    text-align:center;
    font-size:1.2rem;
    margin:20px 0;
}

#gameArea{

    display:flex;
    flex-direction:column;

    align-items:center;
    justify-content:center;

    width:100%;

    margin:20px auto;

}

#gameCanvas{

    width:400px;
    height:400px;

    max-width:100%;

    background:#111;

    border:4px solid #42ff42;

    border-radius:10px;

    box-shadow:0 0 20px rgba(0,255,0,.35);

    image-rendering:pixelated;

}

#coordinates{

    display:none;

    text-align:center;

    margin-top:30px;

}

.result-title{

    font-size:1.4rem;

    font-weight:bold;

    margin-bottom:15px;

}

.coords{

    font-size:1.05rem;

    margin-bottom:15px;

}

#copyButton,
#restartButton{

    padding:10px 18px;

    border:none;

    border-radius:8px;

    cursor:pointer;

    font-size:1rem;

    font-weight:bold;

    background:#f2f2f2;

    color:#000;

    transition:.2s;

}

#copyButton:hover,
#restartButton:hover{

    transform:scale(1.05);

}

#gameOverButtons{

    display:none;

    text-align:center;

    margin-top:20px;

}

@media (max-width:700px){

    #gameCanvas{

        width:320px;
        height:320px;

    }

}

</style>

</head>

<body>

<div class="container">

    <h1 id="challengeTitle">Loading...</h1>

    <div class="controls">
        <button onclick="window.location='index.html'">←</button>
        <button onclick="setLanguage('ca')">CAT</button>
        <button onclick="setLanguage('es')">ESP</button>
        <button onclick="setLanguage('en')">ENG</button>
    </div>

    <div id="instructions" class="instructions">
        Loading...
    </div>

    <div id="gameInfo">

    <strong id="scoreLabel">Score</strong>:
    <span id="score">0000</span>

    &nbsp;&nbsp;&nbsp;

    <strong id="goalLabel">Goal</strong>:
    <span id="goal">20</span>

</div>

    <div id="gameArea">

        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div id="touchArea"></div>

    </div>

    <div id="coordinates">

        <div class="result-title" id="levelCompleteLabel">
        
            🏆 LEVEL COMPLETE
        
        </div>

        <div class="coords" id="coordsText">
            --
        </div>

        <button id="copyButton" onclick="copyCoords()">
        
            📋 <span id="copyLabel">Copy coordinates</span>
        
        </button>

    </div>
    
    <div id="gameOverButtons">
            
        <button id="restartButton" onclick="game.restart()">
        
            🔄 <span id="retryLabel">Try again</span>
        
        </button>

    </div>

</div>

<script src="games/snake.js"></script>
<script src="games/arkanoid.js"></script>    
<script src="app.js"></script>

</body>
</html>
